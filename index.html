<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Ratings Dashboard</title>
<style>
  :root {
    --green: #16a34a; --red: #dc2626; --gray: #9ca3af; --orange: #ea580c;
    --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --muted: #6e6e73; --border: #e5e5ea;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); margin: 0; padding: 32px; color: var(--text);
  }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 22px; margin: 0; }
  .updated { color: var(--muted); font-size: 13px; }

  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-box { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
  .search-box input {
    width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px; border: 1px solid var(--border);
    font-size: 14px; background: var(--card); outline: none;
  }
  .search-box input:focus { border-color: #0071e3; }
  .search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .tabs { display: flex; gap: 6px; background: #e9e9ec; padding: 4px; border-radius: 10px; }
  .tab {
    padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none;
    background: transparent; color: var(--muted); font-weight: 500;
  }
  .tab.active { background: white; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .card {
    background: var(--card); border-radius: 14px; overflow: hidden; cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
    border: 1px solid var(--border);
  }
  .card:hover { transform: translateY(-2px); border-color: #c7c7cc; }
  .card-accent { height: 4px; }
  .accent-up { background: var(--green); }
  .accent-down { background: var(--red); }
  .accent-flat { background: var(--gray); }
  .accent-error { background: var(--orange); }
  .card-body { padding: 16px; }
  .card-sku { font-size: 11px; font-weight: 600; color: #0071e3; letter-spacing: 0.02em; margin-bottom: 4px; }
  .card-title {
    font-size: 14px; font-weight: 600; margin: 0 0 10px 0; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 36px;
  }
  .rating-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .rating-value { font-size: 18px; font-weight: 700; }
  .stars { color: #f5a623; font-size: 13px; }
  .trend-chip {
    font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-flex; align-items: center; gap: 2px;
  }
  .trend-up { background: #dcfce7; color: var(--green); }
  .trend-down { background: #fee2e2; color: var(--red); }
  .trend-flat { background: #f3f4f6; color: var(--gray); }
  .meta-row { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-top: 8px; }
  .error-text { color: var(--orange); font-size: 12px; margin-top: 4px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center; padding: 20px; z-index: 10;
  }
  .overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px; max-width: 560px; width: 100%; max-height: 85vh;
    overflow-y: auto; padding: 28px;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 4px; }
  .modal-title { font-size: 17px; font-weight: 600; margin: 0; }
  .close-btn { background: #f3f4f6; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0; }
  .modal-link { font-size: 13px; color: #0071e3; text-decoration: none; }
  .modal-stats { display: flex; gap: 20px; margin: 18px 0; }
  .stat-box { background: #f9f9fb; border-radius: 10px; padding: 12px 16px; flex: 1; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 700; }
  .chart-container { margin-top: 16px; }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--muted); }
  .history-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 12px; }
  .history-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .history-table td { padding: 6px 8px; border-bottom: 1px solid #f0f0f2; }
</style>
</head>
<body>

  <div class="header">
    <h1>Product Ratings Dashboard</h1>
    <div class="updated">Last updated: 2026-07-14</div>
  </div>

  <div class="controls">
    <div class="search-box">

      <input type="text" id="searchInput" placeholder="Search by SKU (e.g. LLTM45) or product name...">
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="up">Increased</button>
      <button class="tab" data-filter="down">Decreased</button>
      <button class="tab" data-filter="error">Errors</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">No products match your search.</div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="close-btn" id="closeBtn">✕</button>
      </div>
      <a class="modal-link" id="modalLink" target="_blank">View on Amazon →</a>

      <div class="modal-stats">
        <div class="stat-box">
          <div class="stat-label">Current Rating</div>
          <div class="stat-value" id="statRating">–</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Change</div>
          <div class="stat-value" id="statChange">–</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Reviews</div>
          <div class="stat-value" id="statReviews">–</div>
        </div>
      </div>

      <div class="chart-container">

        <div id="chartArea"></div>
      </div>

      <table class="history-table">
        <thead><tr><th>Date</th><th>Rating</th><th>Reviews</th><th>Status</th></tr></thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

const grid = document.getElementById('grid');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');
const tabs = document.querySelectorAll('.tab');
let activeFilter = 'all';

function starString(rating) {
  if (rating === null || rating === undefined) return '';
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function trendChip(p) {
  if (p.trend === 'up') return `<span class="trend-chip trend-up">▲ +${Math.abs(p.delta)}</span>`;
  if (p.trend === 'down') return `<span class="trend-chip trend-down">▼ ${p.delta}</span>`;
  return `<span class="trend-chip trend-flat">– no change</span>`;
}

function accentClass(p) {
  if (p.status && p.status.toLowerCase().includes('error')) return 'accent-error';
  if (p.trend === 'up') return 'accent-up';
  if (p.trend === 'down') return 'accent-down';
  return 'accent-flat';
}

function renderGrid() {
  const query = searchInput.value.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    const matchesSearch = p.name.toLowerCase().includes(query) || (p.sku || '').toLowerCase().includes(query);
    const isError = p.status && p.status.toLowerCase().includes('error');
    let matchesTab = true;
    if (activeFilter === 'up') matchesTab = p.trend === 'up';
    else if (activeFilter === 'down') matchesTab = p.trend === 'down';
    else if (activeFilter === 'error') matchesTab = isError;
    return matchesSearch && matchesTab;
  });

  grid.innerHTML = '';
  emptyState.style.display = filtered.length === 0 ? 'block' : 'none';

  filtered.forEach((p, idx) => {
    const realIdx = PRODUCTS.indexOf(p);
    const isError = p.status && p.status.toLowerCase().includes('error');
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(realIdx);

    if (isError) {
      card.innerHTML = `
        <div class="card-accent accent-error"></div>
        <div class="card-body">
          <div class="card-sku">${p.sku || ''}</div>
          <p class="card-title">${p.name}</p>
          <div class="error-text">⚠️ ${p.status}</div>
        </div>`;
    } else {
      card.innerHTML = `
        <div class="card-accent ${accentClass(p)}"></div>
        <div class="card-body">
          <div class="card-sku">${p.sku || ''}</div>
          <p class="card-title">${p.name}</p>
          <div class="rating-row">
            <span class="rating-value">${p.rating ?? 'N/A'}</span>
            <span class="stars">${starString(p.rating)}</span>
          </div>
          ${trendChip(p)}
          <div class="meta-row">
            <span>${p.review_count || ''}</span>
            <span>${p.price ? '₹' + p.price : ''}</span>
          </div>
        </div>`;
    }
    grid.appendChild(card);
  });
}

function openModal(idx) {
  const p = PRODUCTS[idx];
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalLink').href = p.url;
  document.getElementById('statRating').textContent = p.rating ?? 'N/A';
  document.getElementById('statChange').textContent =
    p.trend === 'up' ? '+' + Math.abs(p.delta) : p.trend === 'down' ? p.delta : 'No change';
  document.getElementById('statReviews').textContent = p.review_count || 'N/A';

  // chart
  const points = p.history.filter(h => h.rating !== null);
  document.getElementById('chartArea').innerHTML = points.length >= 2 ? buildChart(points) : '<p style="color:#9ca3af; font-size:13px;">Not enough data yet for a trend chart — check back after a few more runs.</p>';

  // history table
  const tbody = document.getElementById('historyBody');
  tbody.innerHTML = '';
  [...p.history].reverse().forEach(h => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${h.date}</td><td>${h.rating ?? '–'}</td><td>${h.review_count || '–'}</td><td>${h.status}</td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('overlay').classList.add('open');
}

function buildChart(points) {
  const w = 480, h = 160, pad = 30;
  const ratings = points.map(p => p.rating);
  const min = Math.max(0, Math.min(...ratings) - 0.3);
  const max = Math.min(5, Math.max(...ratings) + 0.3);
  const xStep = (w - pad * 2) / (points.length - 1);

  const coords = points.map((p, i) => {
    const x = pad + i * xStep;
    const y = h - pad - ((p.rating - min) / (max - min)) * (h - pad * 2);
    return [x, y];
  });

  const linePoints = coords.map(c => c.join(',')).join(' ');
  const circles = coords.map((c, i) =>
    `<circle cx="${c[0]}" cy="${c[1]}" r="3.5" fill="#0071e3"></circle>`
  ).join('');
  const firstLabel = points[0].date;
  const lastLabel = points[points.length - 1].date;

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
      <polyline points="${linePoints}" fill="none" stroke="#0071e3" stroke-width="2"></polyline>
      ${circles}
      <text x="${pad}" y="${h - 6}" font-size="10" fill="#9ca3af">${firstLabel}</text>
      <text x="${w - pad}" y="${h - 6}" font-size="10" fill="#9ca3af" text-anchor="end">${lastLabel}</text>
    </svg>`;
}

document.getElementById('closeBtn').onclick = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('overlay').onclick = (e) => { if (e.target.id === 'overlay') e.currentTarget.classList.remove('open'); };
searchInput.addEventListener('input', renderGrid);
tabs.forEach(tab => tab.addEventListener('click', () => {
  tabs.forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeFilter = tab.dataset.filter;
  renderGrid();
}));

renderGrid();
</script>
